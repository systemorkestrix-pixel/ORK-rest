services:
  - type: web
    name: restaurants-api
    env: python
    plan: free
    rootDir: .
    buildCommand: ./build.sh
    startCommand: ./start.sh
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: EXPOSE_DIAGNOSTIC_ENDPOINTS
        value: "true"
      - key: DATABASE_PATH
        value: /var/data/restaurant.db
      - key: CORS_ALLOW_ORIGINS
        value: https://restaurants-console.onrender.com
      - key: ALLOW_LEGACY_PASSWORD_LOGIN
        value: "false"
      - key: JWT_SECRET
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: MASTER_ADMIN_USERNAME
        sync: false
      - key: MASTER_ADMIN_PASSWORD
        sync: false
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
    disks:
      - name: restaurant-db
        mountPath: /var/data
        sizeGB: 1

  - type: static_site
    name: restaurants-console
    rootDir: .
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://restaurants-api.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
